{% extends "base.html" %}
{% block content %}

<div class="container mt-5 mb-5">

  <h4 class="mb-3">Update Patient History</h4>

  <p><strong>Patient Name:</strong> {{ patient.name }}</p>
  <p><strong>Department:</strong> {{ appointment.doctor.department.name if appointment.doctor.department else 'General' }}</p>

  <form method="POST" class="border rounded p-4 shadow-sm">
    <div class="mb-3">
      <label for="diagnosis" class="form-label">Diagnosis</label>
      <input type="text" id="diagnosis" name="diagnosis" class="form-control" required>
    </div>
    <div class="mb-3">
      <label for="medicine" class="form-label">Medicines</label>
      <input type="text" id="medicine" name="medicine" class="form-control" placeholder="e.g. Paracetamol 1-0-1">
    </div>
    <div class="mb-3">
      <label for="prescription" class="form-label">Prescription Details</label>
      <textarea id="prescription" name="prescription" rows="3" class="form-control"></textarea>
    </div>
    <div class="mb-3">
      <label for="notes" class="form-label">Additional Notes</label>
      <textarea id="notes" name="notes" rows="2" class="form-control"></textarea>
    </div>
    <button type="submit" class="btn btn-success">Save</button>
    <a href="{{ url_for('doctor_dash') }}" class="btn btn-outline-secondary">Back</a>
  </form>

</div>

{% endblock %}
