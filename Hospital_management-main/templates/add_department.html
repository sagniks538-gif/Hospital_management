{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
  <h3 class="text-primary mb-4 text-center">Add New Department</h3>

  <form method="POST" class="shadow p-4 rounded bg-light">
    <div class="form-row">
      <div class="form-group col-md-6">
        <label for="deptName">Department Name</label>
        <input type="text" name="name" class="form-control" id="deptName" placeholder="Enter department name" required>
      </div>

      <div class="form-group col-md-6">
        <label for="deptLocation">Location</label>
        <input type="text" name="location" class="form-control" id="deptLocation" placeholder="Department location">
      </div>
    </div>

    <div class="form-group">
      <label for="deptDescription">Description</label>
      <textarea name="description" class="form-control" id="deptDescription" rows="3" placeholder="Brief description..."></textarea>
    </div>

    <div class="form-group form-check mb-3">
      <input type="checkbox" class="form-check-input" id="confirmCheck" required>
      <label class="form-check-label" for="confirmCheck">I confirm the above details are correct</label>
    </div>

    <button type="submit" class="btn btn-primary w-100">Add  Department</button>
    <a href="{{ url_for('admin_dash') }}" class="btn btn-secondary w-100 mt-2">Back</a>
  </form>
</div>
{% endblock %}
