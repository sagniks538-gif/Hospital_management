{% extends "base.html" %}
{% block content %}

<div class="container mt-5">
  <h3 class="text-primary mb-4 text-center">Edit Doctor Details</h3>

  <form method="POST" class="shadow p-4 rounded bg-light">

      <div class="form-row">
          <div class="form-group col-md-6">
              <label class="form-label">Email</label>
              <input type="email" name="email" class="form-control" value="{{ doctor.email }}" required>
          </div>

          <div class="form-group col-md-6">
              <label class="form-label">Password</label>
              <input type="text" name="password" class="form-control" value="{{ doctor.password }}" required>
          </div>
      </div>

      <div class="form-row mt-3">
          <div class="form-group col-md-6">
              <label class="form-label">Phone</label>
              <input type="text" name="phone" class="form-control" value="{{ doctor.phone }}" required>
          </div>

          <div class="form-group col-md-6">
              <label class="form-label">Gender</label>
              <select name="gender" class="form-control">
                  <option value="Male"   {% if doctor.gender=='Male' %}selected{% endif %}>Male</option>
                  <option value="Female" {% if doctor.gender=='Female' %}selected{% endif %}>Female</option>
                  <option value="Other"  {% if doctor.gender=='Other' %}selected{% endif %}>Other</option>
              </select>
          </div>
      </div>

      <div class="form-row mt-3">
          <div class="form-group col-md-6">
              <label class="form-label">Department</label>
              <select name="department_id" class="form-control">
                  {% for d in departments %}
                      <option value="{{ d.id }}" {% if doctor.department_id == d.id %}selected{% endif %}>
                          {{ d.name }}
                      </option>
                  {% endfor %}
              </select>
          </div>

          <div class="form-group col-md-6">
              <label class="form-label">Experience</label>
              <input type="text" name="experience" class="form-control" value="{{ doctor.experience }}">
          </div>
      </div>

      <div class="mt-3">
          <label class="form-label">Bio</label>
          <textarea name="bio" rows="3" class="form-control">{{ doctor.bio }}</textarea>
      </div>

      <button type="submit" class="btn btn-primary w-100 mt-4">Save Changes</button>
      <a href="{{ url_for('admin_dash') }}" class="btn btn-secondary w-100 mt-2">Back</a>

  </form>
</div>

{% endblock %}
